  <style>
    /* ════════════════════════════════════════
       QUIZ-SPECIFIC STYLES
       ════════════════════════════════════════ */

    /* ── Quiz Hero ── */
    .quiz-hero {
      padding: 140px 0 60px;
      text-align: center;
    }
    .quiz-hero h1 {
      font-size: clamp(32px, 5vw, 52px);
      font-weight: 900;
      color: #fff;
      margin-bottom: 12px;
    }
    .quiz-hero h1 .highlight {
      background: linear-gradient(135deg, #10b981, #34d399, #6ee7b7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .quiz-hero p {
      font-size: 18px;
      color: #a1a1aa;
      max-width: 560px;
      margin: 0 auto;
    }

    /* ── Player Stats Bar ── */
    .player-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
      padding: 16px 24px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 16px;
      margin-bottom: 32px;
      backdrop-filter: blur(12px);
    }
    .player-stat {
      text-align: center;
    }
    .player-stat .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }
    .player-stat .stat-label {
      font-size: 12px;
      color: #71717a;
      margin-top: 2px;
    }
    .player-stat .emerald { color: #10b981; }
    .player-stat .gold { color: #fbbf24; }
    .player-stat .purple { color: #a78bfa; }
    .player-stat .level-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 14px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 50px;
      color: #fff;
      font-weight: 700;
      font-size: 14px;
    }

    /* ── Category Selection ── */
    .category-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .category-btn {
      padding: 20px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 16px;
      color: #a1a1aa;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
      font-family: inherit;
    }
    .category-btn:hover {
      background: rgba(16,185,129,0.05);
      border-color: rgba(16,185,129,0.2);
      color: #fff;
      transform: translateY(-2px);
    }
    .category-btn.active {
      background: rgba(16,185,129,0.1);
      border-color: #10b981;
      color: #10b981;
      box-shadow: 0 0 20px rgba(16,185,129,0.15);
    }
    .category-btn .cat-icon {
      font-size: 28px;
      display: block;
      margin-bottom: 8px;
    }

    /* ── Quiz Container ── */
    .quiz-container {
      max-width: 720px;
      margin: 0 auto;
      position: relative;
    }

    /* ── Quiz Header (progress) ── */
    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .quiz-progress-text {
      font-size: 14px;
      color: #a1a1aa;
      font-weight: 500;
    }
    .quiz-progress-text span {
      color: #10b981;
      font-weight: 700;
    }

    /* ── Timer ── */
    .quiz-timer {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }
    .quiz-timer.warning { color: #fbbf24; }
    .quiz-timer.danger { color: #ef4444; animation: pulse 0.5s ease infinite; }
    .timer-ring {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 3px solid rgba(16,185,129,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .timer-ring.warning { border-color: rgba(251,191,36,0.4); }
    .timer-ring.danger { border-color: rgba(239,68,68,0.4); }
    .timer-ring svg {
      position: absolute;
      top: -3px; left: -3px;
      transform: rotate(-90deg);
    }
    .timer-ring svg circle {
      fill: none;
      stroke: #10b981;
      stroke-width: 3;
      stroke-dasharray: 113.097;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear;
    }
    .timer-ring.warning svg circle { stroke: #fbbf24; }
    .timer-ring.danger svg circle { stroke: #ef4444; }

    /* ── Question Card ── */
    .question-card {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 32px;
      margin-bottom: 24px;
      animation: fadeUp 0.4s ease-out;
    }
    .question-category-tag {
      display: inline-block;
      padding: 4px 12px;
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.15);
      border-radius: 50px;
      font-size: 12px;
      font-weight: 600;
      color: #34d399;
      margin-bottom: 16px;
    }
    .question-number {
      font-size: 13px;
      color: #52525b;
      font-weight: 500;
      margin-bottom: 8px;
    }
    .question-text {
      font-size: 20px;
      font-weight: 600;
      color: #fff;
      line-height: 1.5;
      margin-bottom: 28px;
    }

    /* ── Options ── */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .option-btn {
      padding: 16px 20px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      color: #d4d4d8;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
      text-align: left;
      font-family: inherit;
      line-height: 1.4;
    }
    .option-btn:hover:not(.disabled) {
      background: rgba(16,185,129,0.08);
      border-color: rgba(16,185,129,0.3);
      color: #fff;
      transform: translateY(-1px);
    }
    .option-btn .option-letter {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      font-size: 12px;
      font-weight: 700;
      color: #71717a;
      margin-right: 12px;
      transition: all 0.2s;
    }
    .option-btn:hover:not(.disabled) .option-letter {
      background: rgba(16,185,129,0.2);
      color: #10b981;
    }
    .option-btn.correct {
      background: rgba(16,185,129,0.15);
      border-color: #10b981;
      color: #34d399;
    }
    .option-btn.correct .option-letter {
      background: #10b981;
      color: #fff;
    }
    .option-btn.wrong {
      background: rgba(239,68,68,0.15);
      border-color: #ef4444;
      color: #f87171;
    }
    .option-btn.wrong .option-letter {
      background: #ef4444;
      color: #fff;
    }
    .option-btn.disabled {
      cursor: default;
      opacity: 0.7;
    }

    /* ── Feedback ── */
    .feedback-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      border-radius: 14px;
      margin-top: 16px;
      font-size: 14px;
      font-weight: 500;
      animation: fadeUp 0.3s ease-out;
    }
    .feedback-bar.correct {
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.2);
      color: #34d399;
    }
    .feedback-bar.wrong {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      color: #f87171;
    }
    .feedback-bar .feedback-emoji { font-size: 24px; }

    /* ── Next Button ── */
    .next-btn {
      display: none;
      margin-top: 20px;
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #10b981, #059669);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
    }
    .next-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(16,185,129,0.3); }
    .next-btn.show { display: block; animation: fadeUp 0.3s ease-out; }

    /* ── Results Screen ── */
    .results-screen {
      display: none;
      animation: scaleIn 0.4s ease-out;
    }
    .results-screen.show { display: block; }
    .quiz-play-area { display: block; }
    .quiz-play-area.hidden { display: none; }

    .results-card {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 24px;
      padding: 48px 32px;
      text-align: center;
      max-width: 560px;
      margin: 0 auto;
    }
    .results-emoji { font-size: 64px; margin-bottom: 16px; display: block; }
    .results-title {
      font-size: 32px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 8px;
    }
    .results-sub {
      font-size: 16px;
      color: #a1a1aa;
      margin-bottom: 32px;
    }
    .results-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }
    .results-stat {
      padding: 16px 12px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 14px;
    }
    .results-stat .r-value {
      font-size: 24px;
      font-weight: 800;
      color: #fff;
    }
    .results-stat .r-value.emerald { color: #10b981; }
    .results-stat .r-value.gold { color: #fbbf24; }
    .results-stat .r-value.red { color: #ef4444; }
    .results-stat .r-label {
      font-size: 11px;
      color: #71717a;
      margin-top: 4px;
    }

    /* ── Badges Earned ── */
    .badges-earned {
      margin-bottom: 24px;
    }
    .badges-earned h4 {
      font-size: 14px;
      font-weight: 600;
      color: #a1a1aa;
      margin-bottom: 12px;
    }
    .badge-grid {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .badge-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.2);
      color: #34d399;
    }
    .badge-item.locked {
      background: rgba(255,255,255,0.02);
      border-color: rgba(255,255,255,0.05);
      color: #52525b;
      opacity: 0.5;
    }

    /* ── Results Buttons ── */
    .results-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* ── Leaderboard ── */
    .leaderboard-section {
      margin-top: 48px;
    }
    .leaderboard-section h3 {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 16px;
      text-align: center;
    }
    .leaderboard-table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 16px;
      overflow: hidden;
    }
    .leaderboard-table th {
      padding: 12px 16px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: #71717a;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      background: rgba(255,255,255,0.02);
    }
    .leaderboard-table td {
      padding: 12px 16px;
      font-size: 14px;
      color: #d4d4d8;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .leaderboard-table tr:last-child td { border-bottom: none; }
    .leaderboard-table tr:hover td { background: rgba(255,255,255,0.02); }
    .leaderboard-table .rank {
      font-weight: 700;
      color: #10b981;
      width: 36px;
    }
    .leaderboard-table .rank-1 { color: #fbbf24; }
    .leaderboard-table .rank-2 { color: #a78bfa; }
    .leaderboard-table .rank-3 { color: #34d399; }
    .leaderboard-table .current-player td {
      background: rgba(16,185,129,0.05);
      color: #fff;
      font-weight: 600;
    }
    .leaderboard-empty {
      text-align: center;
      padding: 40px;
      color: #52525b;
      font-size: 14px;
    }

    /* ── Emoji Toast Notifications ── */
    .emoji-toast {
      position: fixed;
      top: 50%;
