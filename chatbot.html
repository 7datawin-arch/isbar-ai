<!DOCTYPE html>
<html lang="so">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IsBar AI Chatbot — Caawiyahaaga AI-ga</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .chat-header {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      padding: 20px 24px;
      border-bottom: 2px solid #10b981;
      text-align: center;
    }
    .chat-header h1 {
      font-size: 1.6rem;
      color: #10b981;
      margin-bottom: 4px;
    }
    .chat-header p {
      font-size: 0.9rem;
      color: #94a3b8;
    }
    .chat-header .support-badge {
      display: inline-block;
      margin-top: 8px;
      background: #10b98120;
      border: 1px solid #10b981;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 0.8rem;
      color: #10b981;
    }
    .chat-header .support-badge a {
      color: #10b981;
      text-decoration: none;
      font-weight: bold;
    }

    /* Chat Container */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
      padding: 16px;
    }

    /* Messages Area */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #0f172a;
      border-radius: 16px;
      margin-bottom: 16px;
      min-height: 400px;
      max-height: 60vh;
    }

    .chat-messages::-webkit-scrollbar {
      width: 6px;
    }
    .chat-messages::-webkit-scrollbar-track {
      background: #1e293b;
      border-radius: 3px;
    }
    .chat-messages::-webkit-scrollbar-thumb {
      background: #10b981;
      border-radius: 3px;
    }

    /* Message Bubbles */
    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 18px;
      line-height: 1.5;
      font-size: 0.95rem;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      background: #10b981;
      color: #0f172a;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.bot {
      background: #1e293b;
      color: #e2e8f0;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      border-left: 3px solid #10b981;
    }

    .message.bot .typing-cursor {
      display: inline-block;
      width: 8px;
      height: 16px;
      background: #10b981;
      margin-left: 4px;
      animation: blink 0.8s infinite;
      vertical-align: middle;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    .message .timestamp {
      font-size: 0.65rem;
      color: #64748b;
      margin-top: 6px;
      text-align: right;
    }

    .message.user .timestamp {
      color: #0f172a80;
    }

    /* Quick Reply Buttons */
    .quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 16px 12px;
      justify-content: center;
    }

    .quick-reply-btn {
      background: transparent;
      border: 1px solid #10b981;
      color: #10b981;
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
      font-family: inherit;
    }

    .quick-reply-btn:hover {
      background: #10b981;
      color: #0f172a;
    }

    /* Input Area */
    .chat-input-area {
      display: flex;
      gap: 8px;
      padding: 8px 0;
    }

    .chat-input-area input {
      flex: 1;
      padding: 14px 18px;
      border-radius: 30px;
      border: 2px solid #334155;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    .chat-input-area input:focus {
      border-color: #10b981;
    }

    .chat-input-area input::placeholder {
      color: #64748b;
    }

    .chat-input-area button {
      background: #10b981;
      border: none;
      color: #0f172a;
      padding: 14px 24px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.95rem;
      transition: all 0.2s;
      font-family: inherit;
    }

    .chat-input-area button:hover {
      background: #059669;
    }

    /* Support Section */
    .support-section {
      background: #1e293b;
      border-top: 2px solid #10b981;
      padding: 20px 24px;
      text-align: center;
    }

    .support-section h3 {
      color: #10b981;
      font-size: 1.2rem;
      margin-bottom: 12px;
    }

    .support-section .support-info {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      margin-top: 12px;
    }

    .support-section .support-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #94a3b8;
      font-size: 0.9rem;
    }

    .support-section .support-item a {
      color: #10b981;
      text-decoration: none;
    }

    .support-section .support-item a:hover {
      text-decoration: underline;
    }

    .support-section .support-icon {
      font-size: 1.2rem;
    }

    /* Clear chat button */
    .clear-btn {
      background: transparent;
      border: 1px solid #334155;
      color: #64748b;
      padding: 6px 14px;
      border-radius: 16px;
      cursor: pointer;
      font-size: 0.75rem;
      transition: all 0.2s;
      font-family: inherit;
      margin-top: 8px;
    }

    .clear-btn:hover {
      border-color: #ef4444;
      color: #ef4444;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .chat-header h1 { font-size: 1.2rem; }
      .message { max-width: 90%; font-size: 0.9rem; }
      .chat-container { padding: 8px; }
      .chat-messages { min-height: 300px; max-height: 50vh; padding: 12px; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="chat-header">
    <h1>🤖 IsBar AI Chatbot</h1>
    <p>Caawiyahaaga AI-ga — Ka hel jawaabaha su'aalahaada isla markiiba</p>
    <div class="support-badge">
      @ <a href="support.html">MFARATOON</a> — Taageero 24/7
    </div>
  </header>

  <!-- Chat Container -->
  <div class="chat-container">
    <div class="chat-messages" id="chatMessages">
      <!-- Bot greeting will be inserted by JS -->
    </div>

    <!-- Quick Reply Buttons -->
    <div class="quick-replies" id="quickReplies">
      <button class="quick-reply-btn" onclick="sendQuickReply('Adeegyada')">Adeegyada</button>
      <button class="quick-reply-btn" onclick="sendQuickReply('Koorsooyinka')">Koorsooyinka</button>
      <button class="quick-reply-btn" onclick="sendQuickReply('Buugaagta')">Buugaagta</button>
      <button class="quick-reply-btn" onclick="sendQuickReply('Community')">Community</button>
      <button class="quick-reply-btn" onclick="sendQuickReply('Xiriir')">Xiriir</button>
    </div>

    <!-- Input Area -->
    <div class="chat-input-area">
      <input type="text" id="chatInput" placeholder="Qor su'aashaada halkan..." autofocus
             onkeydown="if(event.key==='Enter') sendMessage()">
      <button onclick="sendMessage()">Dir ▶</button>
    </div>

    <div style="text-align: center;">
      <button class="clear-btn" onclick="clearChat()">Tirtir taariikhda sheekada</button>
    </div>
  </div>

  <!-- Support Section -->
  <div class="support-section">
    <h3>@MFARATOON — Taageero & Xiriir</h3>
    <p style="color: #94a3b8; font-size: 0.85rem; margin-bottom: 8px;">
      Jawaab celin: 24 saac gudahood
    </p>
    <div class="support-info">
      <div class="support-item">
        <span class="support-icon">📧</span>
        <a href="mailto:suxufi34@gmail.com">suxufi34@gmail.com</a>
      </div>
      <div class="support-item">
        <span class="support-icon">📞</span>
        <a href="tel:+17803358180">780-335-8180</a>
      </div>
      <div class="support-item">
        <span class="support-icon">📍</span>
        <span>Edmonton, Alberta, Canada</span>
      </div>
      <div class="support-item">
        <span class="support-icon">🌐</span>
        <a href="https://isbar-ai.com" target="_blank">isbar-ai.com</a>
      </div>
    </div>
  </div>

  <script src="assets/knowledge.js"></script>
  <script>
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');

    // Load chat history from localStorage
    function loadChat() {
      const saved = localStorage.getItem('isbar-chat-history');
      if (saved) {
        try {
          const messages = JSON.parse(saved);
          messages.forEach(msg => {
            addMessage(msg.text, msg.sender, false);
          });
        } catch(e) {
          console.error('Failed to load chat history:', e);
        }
      } else {
        // First visit - show welcome
        setTimeout(() => {
          addMessage("As-salaamu Calaykum! Ku soo dhawoow IsBar AI. Anigu waxaan ahay Caawiyahaaga AI-ga. Waxaan ka jawaabi karaa su'aalaha ku saabsan IsBar AI, koorsooyinka, buugaagta, community-ga, iyo waxyaabo kale oo badan. Sideen kuu caawin karaa?", 'bot');
        }, 500);
      }
    }

    // Save chat to localStorage
    function saveChat() {
      const messages = [];
      document.querySelectorAll('.message').forEach(el => {
        const text = el.childNodes[0]?.textContent || el.textContent;
        const sender = el.classList.contains('user') ? 'user' : 'bot';
        // Remove timestamp from text for saving
        const ts = el.querySelector('.timestamp');
        let cleanText = text;
        if (ts) {
          cleanText = text.replace(ts.textContent, '').trim();
        }
        messages.push({ text: cleanText, sender });
      });
      localStorage.setItem('isbar-chat-history', JSON.stringify(messages));
    }

    // Add message to chat
    function addMessage(text, sender, save = true) {
      const div = document.createElement('div');
      div.className = `message ${sender}`;

      const textSpan = document.createElement('span');
      textSpan.textContent = text;
      div.appendChild(textSpan);

      const ts = document.createElement('div');
      ts.className = 'timestamp';
      const now = new Date();
      ts.textContent = now.toLocaleTimeString('so-SO', { hour: '2-digit', minute: '2-digit' });
      div.appendChild(ts);

      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;

      if (save) saveChat();
      return div;
    }

    // Typewriter effect for bot responses
    function typewriterEffect(element, fullText, index = 0, callback = null) {
      if (index < fullText.length) {
        element.textContent = fullText.substring(0, index + 1);

        // Update or add cursor
        let cursor = element.querySelector('.typing-cursor');
        if (!cursor) {
          cursor = document.createElement('span');
          cursor.className = 'typing-cursor';
          element.appendChild(cursor);
        }
        cursor.style.display = 'inline-block';

        setTimeout(() => typewriterEffect(element, fullText, index + 1, callback), 15 + Math.random() * 25);
      } else {
        // Remove cursor
        const cursor = element.querySelector('.typing-cursor');
        if (cursor) cursor.style.display = 'none';
        chatMessages.scrollTop = chatMessages.scrollHeight;
        if (callback) callback();
      }
    }

    // Bot responds with typewriter
    function botRespond(query) {
      const response = findKnowledge(query);
      if (!response) {
        const fallback = "Waan ka xumahay, kuma hayo macluumaad ku saabsan su'aashaas. Fadlan isku day su'aal kale ama nagu soo xiriir taageerada @MFARATOON.\n\nSu'aalaha aad weydiin karto:\n• IsBar AI waa maxay?\n• Waa maxay adeegyada?\n• Koorsooyinka\n• Buugaagta PDF-ka\n• WhatsApp Bot\n• Xiriirinta taageerada";
        const msgDiv = addMessage('', 'bot');
        const textSpan = msgDiv.querySelector('span');
        textSpan.textContent = '';
        typewriterEffect(textSpan, fallback);
        return;
      }

      const msgDiv = addMessage('', 'bot');
      const textSpan = msgDiv.querySelector('span');
      textSpan.textContent = '';
      typewriterEffect(textSpan, response);
    }

    // Send user message
    function sendMessage() {
      const text = chatInput.value.trim();
      if (!text) return;

      addMessage(text, 'user');
      chatInput.value = '';
      chatInput.focus();

      setTimeout(() => botRespond(text), 300);
    }

    // Quick reply handler
    function sendQuickReply(text) {
      addMessage(text === 'Xiriir' ? 'Xiriir' : text, 'user');
      // Map to knowledge base keys
      const mapping = {
        'Adeegyada': 'adeegyada',
        'Koorsooyinka': 'koorsooyinka',
        'Buugaagta': 'buugaagta',
        'Community': 'community',
        'Xiriir': 'contact'
      };
      const key = mapping[text] || text.toLowerCase();
      setTimeout(() => {
        const response = knowledgeBase[key] || knowledgeBase['salaan'];
        const msgDiv = addMessage('', 'bot');
        const textSpan = msgDiv.querySelector('span');
        textSpan.textContent = '';
        typewriterEffect(textSpan, response);
      }, 300);
    }

    // Clear chat
    function clearChat() {
      if (confirm('Ma hubtaa inaad tirtirto taariikhda sheekada?')) {
        localStorage.removeItem('isbar-chat-history');
        chatMessages.innerHTML = '';
        setTimeout(() => {
          addMessage("As-salaamu Calaykum! Ku soo dhawoow IsBar AI. Sideen kuu caawin karaa?", 'bot');
        }, 200);
      }
    }

    // Initialize
    loadChat();
  </script>

</body>
</html>
